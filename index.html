<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NO-PIECE // World Government Database</title>
<meta name="description" content="NO-PIECE — World Government Database Terminal" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background layers -->
  <canvas id="particle-field" aria-hidden="true"></canvas>
  <div class="grid-overlay" aria-hidden="true"></div>
  <div class="scanline" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <div class="noise" aria-hidden="true"></div>

  <div class="frame">

    <!-- Corner HUD brackets -->
    <span class="corner corner--tl" aria-hidden="true"></span>
    <span class="corner corner--tr" aria-hidden="true"></span>
    <span class="corner corner--bl" aria-hidden="true"></span>
    <span class="corner corner--br" aria-hidden="true"></span>

    <!-- TOP STATUS BAR -->
    <header class="statusbar">
      <div class="status-item status-item--online">
        <span class="dot dot--pulse"></span>
        <span class="status-text">SYSTEM STATUS: <b>ONLINE</b></span>
      </div>
      <div class="status-item status-item--secure">
        <svg class="icon-lock" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="5" y="11" width="14" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M8 11V7.5a4 4 0 0 1 8 0V11" stroke="currentColor" stroke-width="1.4"/>
        </svg>
        <span class="status-text">SECURE NETWORK · <b>ENCRYPTED</b></span>
      </div>
    </header>

    <!-- MAIN -->
    <main class="terminal">

      <p class="eyebrow">
        <span class="eyebrow-tick">//</span> WORLD GOVERNMENT ACCESS NODE <span class="eyebrow-code">CP-0417</span>
      </p>

      <h1 class="title" data-text="NO-PIECE">
        <span aria-hidden="true" class="title-glitch">NO-PIECE</span>
        NO-PIECE
      </h1>

      <p class="subtitle">WORLD GOVERNMENT DATABASE</p>

      <div class="divider" aria-hidden="true">
        <span class="divider-line"></span>
        <span class="divider-diamond"></span>
        <span class="divider-line"></span>
      </div>

      <p class="motto">“Every Berry Must Be Earned.”</p>

      <button class="access-btn" id="accessBtn" type="button">
        <span class="access-btn__bracket access-btn__bracket--l">[</span>
        <span class="access-btn__label">
          <span class="access-btn__text">ACCESS TERMINAL</span>
          <span class="access-btn__loading">AUTHENTICATING<span class="dots"><span>.</span><span>.</span><span>.</span></span></span>
        </span>
        <span class="access-btn__bracket access-btn__bracket--r">]</span>
        <span class="access-btn__sheen" aria-hidden="true"></span>
      </button>

      <p class="hint">BIOMETRIC + BOUNTY CLEARANCE REQUIRED</p>

    </main>

    <!-- BOTTOM DATA STRIP -->
    <footer class="databar">
      <div class="stat">
        <span class="stat-label">PIRATES REGISTERED</span>
        <span class="stat-value" id="statPirates" data-target="1247893931">0</span>
      </div>
      <span class="databar-sep" aria-hidden="true"></span>
      <div class="stat">
        <span class="stat-label">DATABASE VERSION</span>
        <span class="stat-value stat-value--static">v9.02.R</span>
      </div>
      <span class="databar-sep" aria-hidden="true"></span>
      <div class="stat">
        <span class="stat-label">LAST UPDATED</span>
        <span class="stat-value stat-value--static" id="lastUpdated">—</span>
      </div>
    </footer>

  </div>

<script src="script.js"></script>
</body>
</html>
